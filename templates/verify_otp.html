<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:linear-gradient(135deg,#dbeafe,#93c5fd);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:15px;
            width:320px;
            text-align:center;
        }

        input,button{
            width:100%;
            padding:12px;
            margin-top:10px;
            border-radius:8px;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Enter OTP</h2>

    <form method="POST">

        <input type="text"
               name="otp"
               placeholder="Enter OTP">

        <button type="submit">Verify</button>

    </form>

</div>

</body>
</html>
