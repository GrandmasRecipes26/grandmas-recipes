{% extends 'base.html' %}

{% block content %}

<div class="auth-container">

<div class="auth-card">

<h2>📝 Create Account</h2>

<form method="POST">

<input type="text"
name="fullname"
placeholder="Full Name"
required>

<input type="email"
name="email"
placeholder="Email"
required>

<input type="text"
name="phone"
placeholder="Phone Number"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Register
</button>

</form>

</div>

</div>

{% endblock %}
