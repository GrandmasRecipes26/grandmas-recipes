<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:linear-gradient(135deg,#a7f3d0,#34d399);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:15px;
            width:320px;
            text-align:center;
        }

        input,button{
            width:100%;
            padding:12px;
            margin-top:10px;
            border-radius:8px;
        }

        button{
            background:#059669;
            color:white;
            border:none;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Reset Password</h2>

    <form method="POST">

        <input type="password"
               name="new_password"
               placeholder="New Password">

        <button type="submit">Update Password</button>

    </form>

</div>

</body>
</html>
