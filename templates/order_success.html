{% extends 'base.html' %}
{% block content %}

<div style="display:flex;justify-content:center;align-items:center;height:80vh;background:#f5f6fa;">

    <div style="
        background:white;
        padding:40px;
        border-radius:15px;
        box-shadow:0px 0px 20px rgba(0,0,0,0.1);
        text-align:center;
        width:400px;
    ">

        <h1 style="color:green;font-size:28px;">
            ✅ Order Successfully Placed
        </h1>

        <hr style="margin:20px 0;">

        <p style="font-size:18px;">
            🛒 Products Total :
            <b>₹{{ total }}</b>
        </p>

        <p style="font-size:18px;">
            🚚 Delivery Charge :
            <b>₹{{ delivery_charge }}</b>
        </p>

        <h2 style="margin-top:20px;color:#d35400;">
            💰 Total Paid : ₹{{ grand_total }}
        </h2>

        <a href="/orders" style="
            display:inline-block;
            margin-top:20px;
            color:#2980b9;
            text-decoration:none;
            font-weight:bold;
        ">
            View My Orders →
        </a>

        <p style="margin-top:20px;color:gray;">
            Thank you for your order ❤️
        </p>

        <a href="/" style="text-decoration:none;">
            <button style="
                margin-top:15px;
                padding:12px 25px;
                background:#ff6600;
                color:white;
                border:none;
                border-radius:10px;
                cursor:pointer;
                font-size:16px;
            ">
                Continue Shopping
            </button>
        </a>

    </div>

</div>

{% endblock %}
