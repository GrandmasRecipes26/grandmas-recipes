{% extends 'base.html' %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2>👵 Login</h2>

        <form method="POST">

            <input type="email"
                   name="email"
                   placeholder="Email Address"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="forgot-link">

<a href="/forgot_password">
Forgot Password?
</a>

</div>

        <p>
            New User?
            <a href="/register">Register</a>
        </p>

    </div>

</div>

{% endblock %}
