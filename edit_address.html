{% extends 'base.html' %}

{% block content %}

<style>
.form-box{
    width:600px;
    margin:50px auto;
    background:white;
    padding:40px;
    border-radius:20px;
}

.form-box h2{
    text-align:center;
    margin-bottom:25px;
}

.form-box input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    font-size:18px;
}

.form-box button{
    width:100%;
    padding:15px;
    background:#d96b00;
    color:white;
    border:none;
    font-size:20px;
}
</style>

<div class="form-box">
    <h2>Edit Address</h2>

    <form action="/save_address" method="POST">

        <input type="text" name="address"
        value="{{ user[5] if user[5] else '' }}"
        placeholder="Address">

        <input type="text" name="city"
        value="{{ user[6] if user[6] else '' }}"
        placeholder="City">

        <input type="text" name="state"
        value="{{ user[7] if user[7] else '' }}"
        placeholder="State">

        <input type="text" name="pincode"
        value="{{ user[8] if user[8] else '' }}"
        placeholder="Pincode">

        <input type="text" name="phone"
        value="{{ user[3] }}"
        placeholder="Phone">

        <button type="submit">Save Address</button>

    </form>
</div>

{% endblock %}
