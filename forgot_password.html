<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:linear-gradient(135deg,#ffecd2,#fcb69f);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:#fff;
            padding:40px;
            width:350px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            color:#d65f00;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
        }

        button{
            width:100%;
            padding:12px;
            background:#d65f00;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#b94e00;
        }

        .link{
            margin-top:15px;
            display:block;
            font-size:14px;
            color:#555;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Forgot Password</h2>

    <form method="POST">

        <input type="email"
               name="email"
               placeholder="Enter your registered email"
               required>

        <button type="submit">
            Send OTP
        </button>

    </form>

    <a class="link" href="/login">Back to Login</a>

</div>

</body>
</html>
